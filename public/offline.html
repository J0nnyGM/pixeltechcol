<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión | PixelTech</title>
    <link rel="stylesheet" href="/css/styles.css"> <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen text-center p-6">
    <div>
        <div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mx-auto mb-6 text-gray-400">
            <i class="fa-solid fa-wifi-slash text-4xl"></i>
        </div>
        <h1 class="text-2xl font-black text-brand-black uppercase mb-2">Estás Offline</h1>
        <p class="text-gray-500 text-sm max-w-xs mx-auto mb-8">
            No tienes conexión a internet en este momento. Revisa tu señal e intenta de nuevo.
        </p>
        <button onclick="window.location.reload()" class="bg-brand-cyan text-white px-8 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-brand-black transition">
            Reintentar
        </button>
    </div>
</body>
</html>

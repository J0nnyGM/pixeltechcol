    <script>
        const initGTM = () => {
            if (window.gtagLoaded) return;
            window.gtagLoaded = true;

            // Inyectamos el script de Google de forma invisible
            const script = document.createElement('script');
            script.src = "https://www.googletagmanager.com/gtag/js?id=G-0HP0VNV5F5";
            script.async = true;
            document.head.appendChild(script);

            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            window.gtag = gtag;
            gtag('js', new Date());
            gtag('config', 'G-0HP0VNV5F5', { 'page_path': window.location.pathname });
        };

        // Solo se ejecuta si el usuario interactúa o si pasan 6 segundos
        ['scroll', 'mousemove', 'touchstart'].forEach(e => window.addEventListener(e, initGTM, { once: true, passive: true }));
        setTimeout(initGTM, 6000);
    </script>
    <script>
        try {
            const cache = localStorage.getItem('pixeltech_promo_slider_cache');
            if (cache && cache.length > 10) {
                const promos = JSON.parse(cache);
                if (promos.length > 0) {
                    const img = promos[0].promoBannerUrl || promos[0].mainImage || promos[0].image;
                    if(img) {
                        document.head.insertAdjacentHTML('beforeend', `<link rel="preload" href="${img}" as="image" fetchpriority="high">`);
                    }
                }
            }
        } catch(e){}
    </script>
